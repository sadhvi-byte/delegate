<script>
/* On-page error readout + mount watchdog — so any failure is visible, never a blank page */
(function(){
  var box=document.getElementById('dg-err');
  function show(msg){
    if(!box) return;
    box.style.cssText='display:block;position:fixed;inset:0;margin:0;padding:22px;background:#fff;color:#b00020;font:13px/1.55 ui-monospace,Menlo,Consolas,monospace;white-space:pre-wrap;overflow:auto;z-index:99999';
    box.textContent='Delegate failed to load:\n\n'+msg+'\n\n(Screenshot this and send it over and I will fix it.)';
  }
  window.__dgShow=show;
  window.addEventListener('error',function(e){ show((e.message||'Script error')+(e.filename?('\n  at '+e.filename+':'+(e.lineno||'?')):'')); });
  window.addEventListener('unhandledrejection',function(e){ show('Promise rejected: '+((e.reason&&e.reason.message)||e.reason||'unknown')); });
  setTimeout(function(){
    var r=document.getElementById('root');
    if(r&&r.childElementCount===0&&box.style.display!=='block'){
      show('App did not mount within 7 seconds.\nA CDN script was likely blocked (React / Supabase / Babel).\nAllow unpkg.com and cdn.jsdelivr.net (or disable any ad-blocker) and reload.');
    }
  },7000);
})();
</script>

/* ════════════════════════  HELPERS  ════════════════════════ */
const cx = (...a)=>a.filter(Boolean).join(" ");
const initials = (n)=>(n||"?").replace(/\(.*?\)/g,"").trim().split(/\s+/).slice(0,2).map(w=>w[0]).join("").toUpperCase();
const today = ()=>new Date().toISOString().slice(0,10);
const isOverdue = (t)=>t.status!=="done" && t.due && t.due<today();
const isDueToday = (t)=>t.status!=="done" && t.due===today();
const addDays = (n)=>{const d=new Date();d.setDate(d.getDate()+n);return d.toISOString().slice(0,10);};
const fmtDate = (iso)=>{ if(!iso) return "—"; const d=new Date(iso+"T00:00:00"), t=new Date(today()+"T00:00:00"); const diff=Math.round((d-t)/86400000); if(diff===0)return "Today"; if(diff===1)return "Tomorrow"; if(diff===-1)return "Yesterday"; if(diff<0)return Math.abs(diff)+"d overdue"; return d.toLocaleDateString("en-GB",{day:"numeric",month:"short"});};
const fmtTime = (h)=>{ if(!h)return ""; let [a,b]=h.split(":").map(Number); const ap=a>=12?"PM":"AM"; a=a%12||12; return a+":"+String(b).padStart(2,"0")+" "+ap;};

  if(!m) m={name:"?",color:"#9aa89c"};

}
function Pill({cfg}){ return <span style={{display:"inline-flex",alignItems:"center",gap:5,padding:"3px 9px",borderRadius:20,background:cfg.bg,color:cfg.color,fontSize:11.5,fontWeight:600,whiteSpace:"nowrap"}}><span style={{width:6,height:6,borderRadius:6,background:cfg.dot||cfg.color}}/>{cfg.label}</span>; }
function Donut({segments,size=124,stroke=17}){
  const r=(size-stroke)/2,c=2*Math.PI*r,total=segments.reduce((s,x)=>s+x.value,0)||1; let off=0;
  return <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}><g transform={`rotate(-90 ${size/2} ${size/2})`}>
    <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="#eef1ec" strokeWidth={stroke}/>
    {segments.map((s,i)=>{const len=c*(s.value/total);const el=<circle key={i} cx={size/2} cy={size/2} r={r} fill="none" stroke={s.color} strokeWidth={stroke} strokeDasharray={`${len} ${c-len}`} strokeDashoffset={-off} style={{transition:"stroke-dasharray .5s ease"}}/>;off+=len;return el;})}
  </g></svg>;
}

/* ════════════════════════  AUTH SCREEN  ════════════════════════ */
function Auth(){
  const [mode,setMode]=useState("in");
  const [email,setEmail]=useState(""),[pw,setPw]=useState(""),[name,setName]=useState("");
  const [role,setRole]=useState(""),[dept,setDept]=useState("Operations");
  const [err,setErr]=useState(""),[msg,setMsg]=useState(""),[busy,setBusy]=useState(false);
  const DOMAIN = "@magppie.com";
  const go = async ()=>{
    setErr("");setMsg("");setBusy(true);
    const addr = email.trim().includes("@") ? email.trim().toLowerCase() : (email.trim().toLowerCase().replace(/\s+/g,"") + DOMAIN);
    try{
      if(mode==="in"){
        const {error}=await sb.auth.signInWithPassword({email:addr,password:pw});
        if(error) throw error;
      }else{
        const color=AVCOLORS[Math.floor(Math.random()*AVCOLORS.length)];
        const {data,error}=await sb.auth.signUp({email:addr,password:pw,options:{data:{name:name||addr.split("@")[0],role:role||"Team Member",dept,color}}});
        if(error) throw error;
        if(!data.session) setMsg("Account created. If email confirmation is on, check your inbox — or ask your admin to confirm you.");
      }
    }catch(e){ setErr(e.message||String(e)); }
    setBusy(false);
  };
  return (
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:"24px 16px"}}>
      <div className="dg-in" style={{width:"100%",maxWidth:420}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:11,marginBottom:22}}>
          <div style={{position:"relative",width:42,height:42,borderRadius:13,background:`linear-gradient(180deg,#5b8a3f,${C.greenDark})`,display:"flex",alignItems:"center",justifyContent:"center",boxShadow:"0 6px 14px -6px rgba(58,99,37,0.6)"}}>
            <IcClip size={22} style={{color:"#fff"}}/><IcSpark size={13} style={{color:C.gold,position:"absolute",top:-3,right:-3}}/>
          </div>
          <span style={{fontSize:23,fontWeight:700,letterSpacing:-0.4}}>Delegate</span>
        </div>
        <div style={{background:"#fff",borderRadius:22,padding:24,border:`1px solid ${C.line}`,boxShadow:C.shadow}}>
          <div style={{fontSize:20,fontWeight:700,marginBottom:3}}>{mode==="in"?"Welcome back":"Create your account"}</div>
          <div style={{fontSize:13.5,color:C.sub,marginBottom:18}}>{mode==="in"?"Sign in to pick up where your team left off.":"Set up your login to start delegating."}</div>
          {mode==="up" && <>
            <Field label="Full name"><input value={name} onChange={e=>setName(e.target.value)} placeholder="Your full name" style={inp}/></Field>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginTop:12}}>
              <Field label="Role"><input value={role} onChange={e=>setRole(e.target.value)} placeholder="Director" style={inp}/></Field>
              <Field label="Department"><div style={{position:"relative"}}><select value={dept} onChange={e=>setDept(e.target.value)} style={sel}>{DEPTS.map(d=><option key={d}>{d}</option>)}</select><IcDown size={15} style={{position:"absolute",right:11,top:13,color:C.faint,pointerEvents:"none"}}/></div></Field>
            </div>
            <div style={{height:12}}/>
          </>}
          <Field label="Username">
            <div style={{position:"relative"}}>
              <IcMail size={16} style={{position:"absolute",left:13,top:13,color:C.faint}}/>
              <input value={email} onChange={e=>setEmail(e.target.value)} type="text" autoCapitalize="none" autoCorrect="off" spellCheck="false" placeholder="name.surname" style={{...inp,paddingLeft:38,paddingRight:120}}/>
              <span style={{position:"absolute",right:13,top:12,color:C.faint,fontSize:13,fontWeight:500,pointerEvents:"none"}}>@magppie.com</span>
            </div>
          </Field>
          <div style={{height:12}}/>
          <Field label="Password">
            <div style={{position:"relative"}}><IcLock size={16} style={{position:"absolute",left:13,top:13,color:C.faint}}/><input value={pw} onChange={e=>setPw(e.target.value)} onKeyDown={e=>e.key==="Enter"&&go()} type="password" placeholder="••••••••" style={{...inp,paddingLeft:38}}/></div>
          </Field>
          {err && <div style={{marginTop:13,padding:"10px 12px",borderRadius:11,background:"#fdecea",color:"#d8463c",fontSize:13,fontWeight:500}}>{err}</div>}
          {msg && <div style={{marginTop:13,padding:"10px 12px",borderRadius:11,background:C.greenSoft,color:C.green,fontSize:13,fontWeight:500}}>{msg}</div>}
          <button onClick={go} disabled={busy||!email||!pw} style={{width:"100%",marginTop:16,padding:"13px",borderRadius:13,border:"none",background:(busy||!email||!pw)?"#cfd8c8":`linear-gradient(180deg,#5b8a3f,${C.greenDark})`,color:"#fff",fontSize:15,fontWeight:700,cursor:busy?"default":"pointer",fontFamily:"inherit",display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
            {busy && <IcLoad size={16} className="dg-spin"/>}{mode==="in"?"Sign in":"Create account"}
          </button>
        </div>
        <div style={{textAlign:"center",marginTop:16,fontSize:13.5,color:C.sub}}>
          {mode==="in"?"New here? ":"Already have an account? "}
          <button onClick={()=>{setMode(mode==="in"?"up":"in");setErr("");setMsg("");}} style={{background:"none",border:"none",color:C.green,fontWeight:700,cursor:"pointer",fontFamily:"inherit",fontSize:13.5}}>{mode==="in"?"Create an account":"Sign in"}</button>
        </div>
      </div>
    </div>
  );
}
const Field = ({label,children})=><div><div style={{fontSize:12,fontWeight:600,color:C.sub,marginBottom:7}}>{label}</div>{children}</div>;

/* ════════════════════════  TASK CARD + COLUMN  ════════════════════════ */
function TaskCard({task,member,onOpen,onDragStart,dragging}){
  const [h,setH]=useState(false); const od=isOverdue(task);
  return <div draggable onDragStart={e=>onDragStart(e,task.id)} onClick={()=>onOpen(task)} onMouseEnter={()=>setH(true)} onMouseLeave={()=>setH(false)}
    style={{background:"#fff",borderRadius:16,padding:"13px 14px",cursor:"pointer",border:`1px solid ${od?"#f4d3cf":C.line}`,opacity:dragging?0.4:1,boxShadow:h?C.shadowHover:C.shadow,transform:h?"translateY(-2px)":"none",transition:"box-shadow .18s ease, transform .18s ease",borderLeft:od?"3px solid #d8463c":`1px solid ${C.line}`}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:7}}>
      <span style={{fontFamily:"ui-monospace,monospace",fontSize:10.5,color:C.faint,fontWeight:600,letterSpacing:0.3}}>{task.code||""}</span>
      <Pill cfg={PRIORITY[task.priority]}/>
    </div>
    <div style={{fontSize:14,fontWeight:600,color:C.ink,lineHeight:1.32,marginBottom:10}}>{task.title}</div>
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
      <div style={{display:"flex",alignItems:"center",gap:7}}><Avatar m={member} size={24}/><span style={{fontSize:12,color:C.sub,fontWeight:500}}>{member?member.name.replace(/\s*\(You\)/,""):"Unassigned"}</span></div>

}
function Column({status,tasks,memberOf,onOpen,onDrop,onDragStart,dragId,onAdd}){

      {tasks.length===0 && <div style={{textAlign:"center",padding:"22px 8px",fontSize:12,color:C.faint,lineHeight:1.5}}>Nothing here yet.<br/>Drag a task over or assign one.</div>}

  const [h,mi]=f.time.split(":").map(Number); const setT=(hh,mm)=>set("time",String(hh).padStart(2,"0")+":"+String(mm).padStart(2,"0"));

  const valid=f.title.trim().length>0;
  return (
    <div onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(28,40,30,0.34)",backdropFilter:"blur(3px)",zIndex:60,display:"flex",alignItems:"flex-start",justifyContent:"center",padding:"5vh 16px",overflowY:"auto"}}>
      <div onClick={e=>e.stopPropagation()} className="dg-in" style={{width:"100%",maxWidth:560,background:"#fff",borderRadius:24,boxShadow:"0 30px 80px -20px rgba(20,40,15,0.5)",overflow:"hidden"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"20px 22px 16px",borderBottom:`1px solid ${C.line}`}}>
          <div style={{display:"flex",alignItems:"center",gap:12}}>

            <div><div style={{fontSize:19,fontWeight:700}}>{editing?"Edit task":"Assign task"}</div>{editing&&<div style={{fontFamily:"ui-monospace,monospace",fontSize:11,color:C.faint}}>{editing.code}{editing.zoho_id?" · synced to Zoho":""}</div>}</div>
          </div>
          <button onClick={onClose} style={btnIcon}><IcX size={18}/></button>
        </div>
        <div style={{padding:"18px 22px 4px",display:"flex",flexDirection:"column",gap:14}}>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
            <Field label="Delegatee"><div style={{position:"relative"}}><select value={f.to} onChange={e=>pick(e.target.value)} style={sel}>{members.map(m=><option key={m.id} value={m.id}>{m.name}</option>)}</select><IcDown size={15} style={{position:"absolute",right:11,top:13,color:C.faint,pointerEvents:"none"}}/></div></Field>
            <Field label="Department"><div style={{position:"relative"}}><select value={f.dept} onChange={e=>set("dept",e.target.value)} style={sel}>{DEPTS.map(d=><option key={d}>{d}</option>)}</select><IcDown size={15} style={{position:"absolute",right:11,top:13,color:C.faint,pointerEvents:"none"}}/></div></Field>
          </div>

          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <Tog active={f.attach} onClick={()=>set("attach",!f.attach)} t="Attach file"><IcClip2 size={16}/></Tog>
            <Tog active={!!f.link} onClick={()=>{const v=prompt("Paste a link",f.link||"");if(v!==null)set("link",v);}} t="Add link"><IcLink size={16}/></Tog>
            <Tog active={listening} pulse={listening} onClick={voice} t="Dictate title"><IcMic size={16}/></Tog>
            <Tog active={f.reminder} onClick={()=>set("reminder",!f.reminder)} t="Set reminder"><IcBell size={16}/></Tog>
            {listening&&<span style={{fontSize:12,color:C.green,fontWeight:600}}>Listening…</span>}
          </div>
          <Field label="Priority"><div style={{display:"flex",gap:8,flexWrap:"wrap"}}>{Object.entries(PRIORITY).map(([k,p])=><button key={k} onClick={()=>set("priority",k)} style={{display:"inline-flex",alignItems:"center",gap:6,padding:"7px 13px",borderRadius:20,cursor:"pointer",border:`1.5px solid ${f.priority===k?p.color:C.line}`,background:f.priority===k?p.bg:"#fff",color:f.priority===k?p.color:C.sub,fontSize:12.5,fontWeight:600,fontFamily:"inherit"}}><span style={{width:7,height:7,borderRadius:7,background:p.dot}}/>{p.label}</button>)}</div></Field>
          <Field label="Status"><div style={{display:"flex",gap:8,flexWrap:"wrap"}}>{STATUS_ORDER.map(k=><button key={k} onClick={()=>set("status",k)} style={{display:"inline-flex",alignItems:"center",gap:6,padding:"7px 13px",borderRadius:20,cursor:"pointer",border:`1.5px solid ${f.status===k?STATUS[k].color:C.line}`,background:f.status===k?STATUS[k].bg:"#fff",color:f.status===k?STATUS[k].color:C.sub,fontSize:12.5,fontWeight:600,fontFamily:"inherit"}}><span style={{width:7,height:7,borderRadius:7,background:STATUS[k].color}}/>{STATUS[k].label}</button>)}</div></Field>
          <Field label="Due date">

            <input type="date" value={f.due||""} onChange={e=>set("due",e.target.value)} style={{...inp,maxWidth:180}}/>
          </Field>
          <Field label="Time">
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <div style={{position:"relative"}}><select value={h12} onChange={e=>{let v=+e.target.value%12;if(ampm==="PM")v+=12;setT(v,mi);}} style={{...sel,paddingRight:26,width:"auto"}}>{Array.from({length:12},(_,i)=>i+1).map(n=><option key={n} value={n}>{String(n).padStart(2,"0")}</option>)}</select></div>
              <span style={{fontWeight:700}}>:</span>
              <div style={{position:"relative"}}><select value={mi} onChange={e=>setT(h,+e.target.value)} style={{...sel,paddingRight:26,width:"auto"}}>{[0,15,30,45].map(n=><option key={n} value={n}>{String(n).padStart(2,"0")}</option>)}</select></div>
              <div style={{display:"flex",borderRadius:12,overflow:"hidden",border:`1px solid ${C.line}`}}>{["AM","PM"].map(ap=><button key={ap} onClick={()=>{let v=h12%12;if(ap==="PM")v+=12;setT(v,mi);}} style={{padding:"9px 15px",fontSize:13,fontWeight:700,cursor:"pointer",border:"none",background:ampm===ap?C.green:"#fff",color:ampm===ap?"#fff":C.sub,fontFamily:"inherit"}}>{ap}</button>)}</div>
            </div>
          </Field>
        </div>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:12,padding:"16px 22px 20px",marginTop:6,flexWrap:"wrap"}}>
          <div style={{display:"flex",gap:8}}>
            {editing && isAdmin && <button onClick={()=>onDelete(editing.id)} style={{display:"inline-flex",alignItems:"center",gap:6,padding:"10px 14px",borderRadius:12,border:"none",background:"#fdecea",color:"#d8463c",fontSize:13.5,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}><IcTrash size={15}/>Delete</button>}
            {editing && <button onClick={()=>onSync(editing)} style={{display:"inline-flex",alignItems:"center",gap:6,padding:"10px 14px",borderRadius:12,border:`1px solid ${C.greenLine}`,background:C.greenSoft,color:C.green,fontSize:13.5,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}><IcSync size={15}/>{editing.zoho_id?"Re-sync Zoho":"Sync to Zoho"}</button>}
          </div>
          <div style={{display:"flex",gap:10}}>
            <button onClick={onClose} style={{padding:"11px 18px",borderRadius:12,border:`1px solid ${C.line}`,background:"#fff",color:C.sub,fontSize:14,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>Cancel</button>
            <button onClick={()=>valid&&onSave(f)} disabled={!valid} style={{display:"inline-flex",alignItems:"center",gap:7,padding:"11px 22px",borderRadius:12,border:"none",background:valid?`linear-gradient(180deg,#5b8a3f,${C.greenDark})`:"#cfd8c8",color:"#fff",fontSize:14,fontWeight:700,cursor:valid?"pointer":"not-allowed",fontFamily:"inherit"}}><IcCheck size={16}/>{editing?"Save changes":"Assign task"}</button>
          </div>
        </div>
      </div>
    </div>
  );
}
const Tog=({children,active,onClick,t,pulse})=><button onClick={onClick} title={t} className={pulse?"dg-pulse":""} style={{width:40,height:40,borderRadius:12,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",border:`1px solid ${active?C.green:C.line}`,background:active?C.greenSoft:"#fff",color:active?C.green:C.sub,fontFamily:"inherit"}}>{children}</button>;

/* ════════════════════════  TOOLBAR  ════════════════════════ */
function Toolbar({members,query,setQuery,filterTo,setFilterTo,filterStatus,setFilterStatus,filterPrio,setFilterPrio,count,hideStatus}){

/* ════════════════  PERFORMANCE DASHBOARD (oversight only)  ════════════════ */
function PerfDashboard({members,tasks,memberOf,setModal,setView,setFilterTo,greet,meName}){
  const perf=useMemo(()=>{
    const rows=members.filter(m=>!m.can_view_all).map(m=>{
      const mine=tasks.filter(t=>t.to===m.id);
      const total=mine.length, done=mine.filter(t=>t.status==="done").length, overdue=mine.filter(isOverdue).length;
      const inprog=mine.filter(t=>t.status==="progress").length, active=mine.filter(t=>t.status!=="done").length;
      const rate=total?Math.round(done/total*100):0;
      let flag="ok";
      if(total===0) flag="none";
      else if(overdue>=2 || (rate<40 && total>=3)) flag="risk";
      else if(rate>=80 && overdue===0 && total>=3) flag="top";
      return {m,total,done,overdue,inprog,active,rate,flag};
    }).filter(x=>x.total>0);
    const rank={risk:0,ok:1,top:2,none:3};
    rows.sort((a,b)=>(rank[a.flag]-rank[b.flag])||(b.overdue-a.overdue)||(a.rate-b.rate));
    return rows;
  },[members,tasks]);
  const totals=useMemo(()=>{
    const total=tasks.length, done=tasks.filter(t=>t.status==="done").length, overdue=tasks.filter(isOverdue).length, active=tasks.filter(t=>t.status!=="done").length;
    return {total,done,overdue,active,rate:total?Math.round(done/total*100):0,people:perf.length};
  },[tasks,perf]);
  const risk=perf.filter(x=>x.flag==="risk"), top=perf.filter(x=>x.flag==="top");
  const FLAG={top:{label:"Performer",bg:"#e9f5e3",color:"#3a6325"},ok:{label:"On track",bg:"#fff5e6",color:"#b9731a"},risk:{label:"Needs attention",bg:"#fdecea",color:"#d8463c"},none:{label:"No tasks",bg:"#eef1ec",color:"#8a94a6"}};
  const drill=(id)=>{ setFilterTo(id); setView("list"); };
  return (
    <div style={{display:"flex",flexDirection:"column",gap:20}}>
      <div><div style={{fontSize:25,fontWeight:700,letterSpacing:-0.5}}>{greet}, {meName} 👋</div><div style={{fontSize:14.5,color:C.sub,marginTop:2}}>Team performance — who's on track and who needs a nudge.</div></div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit, minmax(170px, 1fr))",gap:14}}>
        <Kpi ic={<IcUsers size={17}/>} label="People with tasks" value={totals.people} acc={{bg:C.greenSoft,color:C.green}}/>
        <Kpi ic={<IcTrend size={17}/>} label="Active tasks" value={totals.active} acc={{bg:"#eaf2fb",color:"#3f7fc0"}}/>
        <Kpi ic={<IcAlert size={17}/>} label="Overdue (team)" value={totals.overdue} acc={{bg:"#fdecea",color:"#d8463c"}} sub={totals.overdue?"across the team":""}/>
        <Kpi ic={<IcCirc size={17}/>} label="Team completion" value={totals.rate+"%"} acc={{bg:C.goldSoft,color:C.gold}}/>
      </div>
      <div className="dg-dashgrid" style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16}}>
        <div style={{...card,borderColor:"#f4cfca"}}>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}><IcAlert size={17} style={{color:"#d8463c"}}/><span style={{fontSize:15.5,fontWeight:700,color:"#d8463c"}}>Needs attention</span></div>
          {risk.length===0&&<div style={{color:C.faint,fontSize:13,padding:"6px 0"}}>Nobody flagged. Team's keeping up. 🎉</div>}
          {risk.map(({m,overdue,rate,total},i)=><div key={m.id} onClick={()=>drill(m.id)} style={{display:"flex",alignItems:"center",gap:11,padding:"10px 4px",borderTop:i?`1px solid ${C.line}`:"none",cursor:"pointer"}}><Avatar m={m} size={32}/><div style={{flex:1,minWidth:0}}><div style={{fontSize:13.5,fontWeight:600}}>{m.name.replace(/\s*\(You\)/,"")}</div><div style={{fontSize:12,color:C.faint}}>{m.dept}</div></div><div style={{textAlign:"right"}}><div style={{fontSize:13,fontWeight:700,color:"#d8463c"}}>{overdue} overdue</div><div style={{fontSize:11.5,color:C.faint}}>{rate}% done · {total} tasks</div></div></div>)}
        </div>
        <div style={{...card,borderColor:"#cfe6c2"}}>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}><IcSpark size={16} style={{color:C.gold}}/><span style={{fontSize:15.5,fontWeight:700,color:C.green}}>Top performers</span></div>
          {top.length===0&&<div style={{color:C.faint,fontSize:13,padding:"6px 0"}}>No standouts yet — needs a few more completed tasks.</div>}
          {top.map(({m,done,total,rate},i)=><div key={m.id} onClick={()=>drill(m.id)} style={{display:"flex",alignItems:"center",gap:11,padding:"10px 4px",borderTop:i?`1px solid ${C.line}`:"none",cursor:"pointer"}}><Avatar m={m} size={32}/><div style={{flex:1,minWidth:0}}><div style={{fontSize:13.5,fontWeight:600}}>{m.name.replace(/\s*\(You\)/,"")}</div><div style={{fontSize:12,color:C.faint}}>{m.dept}</div></div><div style={{textAlign:"right"}}><div style={{fontSize:13,fontWeight:700,color:C.green}}>{rate}% done</div><div style={{fontSize:11.5,color:C.faint}}>{done}/{total} complete</div></div></div>)}
        </div>
      </div>
      <div style={card}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:6}}><span style={{fontSize:15.5,fontWeight:700}}>Everyone's scorecard</span><span style={{fontSize:12,color:C.faint}}>tap a row to see their tasks</span></div>
        <div style={{overflowX:"auto"}}>
          <table style={{width:"100%",borderCollapse:"collapse",minWidth:560}}>
            <thead><tr style={{textAlign:"left",color:C.faint,fontSize:11.5,fontWeight:700,textTransform:"uppercase",letterSpacing:0.3}}>
              <th style={{padding:"10px 8px"}}>Person</th><th style={{padding:"10px 8px"}}>Assigned</th><th style={{padding:"10px 8px"}}>In progress</th><th style={{padding:"10px 8px"}}>Done</th><th style={{padding:"10px 8px"}}>Overdue</th><th style={{padding:"10px 8px"}}>Completion</th><th style={{padding:"10px 8px"}}>Status</th>
            </tr></thead>
            <tbody>
              {perf.length===0&&<tr><td colSpan={7} style={{padding:"16px 8px",color:C.faint,fontSize:13}}>No tasks assigned yet.</td></tr>}
              {perf.map(({m,total,inprog,done,overdue,rate,flag})=><tr key={m.id} onClick={()=>drill(m.id)} style={{cursor:"pointer",borderTop:`1px solid ${C.line}`}}>
                <td style={{padding:"11px 8px"}}><div style={{display:"flex",alignItems:"center",gap:9}}><Avatar m={m} size={30}/><div><div style={{fontSize:13.5,fontWeight:600}}>{m.name.replace(/\s*\(You\)/,"")}</div><div style={{fontSize:11.5,color:C.faint}}>{m.dept}</div></div></div></td>
                <td style={{padding:"11px 8px",fontSize:13.5,fontWeight:600}}>{total}</td>
                <td style={{padding:"11px 8px",fontSize:13.5,color:C.sub}}>{inprog}</td>
                <td style={{padding:"11px 8px",fontSize:13.5,color:C.green,fontWeight:600}}>{done}</td>
                <td style={{padding:"11px 8px",fontSize:13.5,fontWeight:700,color:overdue>0?"#d8463c":C.faint}}>{overdue}</td>
                <td style={{padding:"11px 8px",minWidth:120}}><div style={{display:"flex",alignItems:"center",gap:8}}><div style={{flex:1,height:7,borderRadius:7,background:"#eef1ec",overflow:"hidden",minWidth:54}}><div style={{height:"100%",width:rate+"%",borderRadius:7,background:rate>=70?`linear-gradient(90deg,#6fa84e,${C.green})`:rate>=40?"linear-gradient(90deg,#e8b13b,#cf7a23)":"linear-gradient(90deg,#e8893b,#d8463c)"}}/></div><span style={{fontSize:12.5,fontWeight:700,minWidth:34,textAlign:"right"}}>{rate}%</span></div></td>
                <td style={{padding:"11px 8px"}}><span style={{display:"inline-block",padding:"4px 10px",borderRadius:20,fontSize:11.5,fontWeight:700,background:FLAG[flag].bg,color:FLAG[flag].color,whiteSpace:"nowrap"}}>{FLAG[flag].label}</span></td>
              </tr>)}
            </tbody>
          </table>
        </div>
        <div style={{fontSize:11.5,color:C.faint,marginTop:10,lineHeight:1.5}}>Flags are guidance — <b style={{color:"#d8463c"}}>Needs attention</b>: 2+ overdue or under 40% done · <b style={{color:C.green}}>Performer</b>: 80%+ done with nothing overdue · everyone else On track. Based on tasks assigned to each person.</div>
      </div>
    </div>
  );
}

/* ════════════════  NAME PICKER (no-login entry)  ════════════════ */
function NameGate({members,onPick}){
  const [q,setQ]=useState("");
  const list=members.filter(m=>m.name.toLowerCase().includes(q.toLowerCase()));
  return (
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:"24px 16px"}}>
      <div className="dg-in" style={{width:"100%",maxWidth:460}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:11,marginBottom:22}}>
          <div style={{position:"relative",width:42,height:42,borderRadius:13,background:`linear-gradient(180deg,#5b8a3f,${C.greenDark})`,display:"flex",alignItems:"center",justifyContent:"center",boxShadow:"0 6px 14px -6px rgba(58,99,37,0.6)"}}>
            <IcClip size={22} style={{color:"#fff"}}/><IcSpark size={13} style={{color:C.gold,position:"absolute",top:-3,right:-3}}/>
          </div>
          <span style={{fontSize:23,fontWeight:700,letterSpacing:-0.4}}>Delegate</span>
        </div>
        <div style={{background:"#fff",borderRadius:22,padding:24,border:`1px solid ${C.line}`,boxShadow:C.shadow}}>
          <div style={{fontSize:20,fontWeight:700,marginBottom:3}}>Who are you?</div>
          <div style={{fontSize:13.5,color:C.sub,marginBottom:16}}>Tap your name to open the team board.</div>
          <div style={{display:"flex",alignItems:"center",border:`1px solid ${C.line}`,borderRadius:12,padding:"2px 12px",marginBottom:12}}>
            <IcSearch size={16} style={{color:C.faint}}/>
            <input value={q} onChange={e=>setQ(e.target.value)} placeholder="Search your name…" style={{flex:1,border:"none",outline:"none",fontSize:14,padding:"9px 10px",background:"transparent",fontFamily:"inherit",color:C.ink}}/>
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:2,maxHeight:340,overflowY:"auto",margin:"0 -6px",padding:"0 6px"}}>
            {list.length===0&&<div style={{color:C.faint,fontSize:13,padding:"12px 4px"}}>No name matches that search.</div>}
            {list.map(m=><button key={m.id} onClick={()=>onPick(m.id)} className="dg-namerow" style={{display:"flex",alignItems:"center",gap:12,padding:"10px",borderRadius:12,border:"none",background:"transparent",cursor:"pointer",textAlign:"left",fontFamily:"inherit",width:"100%"}}>
              <Avatar m={m} size={36}/>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:14.5,fontWeight:600,color:C.ink}}>{m.name.replace(/\s*\(You\)/,"")}</div>
                <div style={{fontSize:12,color:C.faint}}>{m.role} · {m.dept}</div>
              </div>
              {m.is_admin&&<span style={{fontSize:10.5,fontWeight:700,color:C.green,background:C.greenSoft,padding:"3px 8px",borderRadius:20}}>Admin</span>}
              <IcRight size={16} style={{color:C.faint}}/>
            </button>)}
          </div>
        </div>
        <div style={{textAlign:"center",fontSize:12,color:C.faint,marginTop:14}}>No password needed — just pick your name.</div>
      </div>
    </div>
  );
}

/* ════════════════════════  APP  ════════════════════════ */
function App(){
  const [me,setMe]=useState(()=>{ try{return localStorage.getItem("dg_me")||null;}catch(e){return null;} });
  const [loading,setLoading]=useState(true);
  const [members,setMembers]=useState([]);
  const [tasks,setTasks]=useState([]);
  const [view,setView]=useState("dashboard");
  const [modal,setModal]=useState(null);
  const [dragId,setDragId]=useState(null);
  const [toast,setToast]=useState(null);
  const [query,setQuery]=useState("");
  const [quick,setQuick]=useState(null);
  const [filterTo,setFilterTo]=useState("all"),[filterStatus,setFilterStatus]=useState("all"),[filterPrio,setFilterPrio]=useState("all");

  const meId = me;
  const memberOf = useCallback((id)=>members.find(m=>m.id===id),[members]);

  const loadMembers = useCallback(async ()=>{ const {data}=await sb.from("dg_profiles").select("*").order("name"); if(data) setMembers(data.map(p=>({id:p.id,name:p.id===me?p.name+" (You)":p.name,role:p.role,dept:p.dept,color:p.color,is_admin:p.is_admin,can_view_all:p.can_view_all}))); setLoading(false); },[me]);
  const loadTasks = useCallback(async ()=>{ const {data}=await sb.from("dg_tasks").select("*").order("created_at",{ascending:false}); if(data) setTasks(data.map(fromRow)); },[]);

  useEffect(()=>{ loadMembers(); loadTasks(); },[loadMembers,loadTasks]);
  useEffect(()=>{ const ch=sb.channel("dg_rt").on("postgres_changes",{event:"*",schema:"public",table:"dg_tasks"},()=>loadTasks()).subscribe(); return ()=>{sb.removeChannel(ch);}; },[loadTasks]);
  useEffect(()=>{ if(toast){const t=setTimeout(()=>setToast(null),2600);return ()=>clearTimeout(t);} },[toast]);
  const show=(m)=>setToast({m,id:Date.now()});

  const notifyN8N=async(event,task)=>{ if(!N8N_WEBHOOK_URL) return; try{ await fetch(N8N_WEBHOOK_URL,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({event,task:{...task,assignee:memberOf(task.to)?.name,delegator:memberOf(task.by)?.name},at:new Date().toISOString()})}); }catch(e){} };

  const saveTask=async(f)=>{
    const row={title:f.title,notes:f.notes,assignee_id:f.to,dept:f.dept,priority:f.priority,status:f.status,due:f.due,due_time:f.time,reminder:f.reminder,attach:f.attach,link:f.link};
    if(f.id){ await sb.from("dg_tasks").update(row).eq("id",f.id); show("Task updated"); notifyN8N("task.updated",{...f}); }
    else{ row.delegator_id=meId; const {data}=await sb.from("dg_tasks").insert(row).select().single(); show("Assigned to "+(memberOf(f.to)?.name||"").replace(/\s*\(You\)/,"")); if(data) notifyN8N("task.assigned",fromRow(data)); }
    setModal(null); loadTasks();
  };
  const delTask=async(id)=>{ await sb.from("dg_tasks").delete().eq("id",id); setModal(null); show("Task deleted"); loadTasks(); };
  const moveTask=async(id,status)=>{ if(!id) return; const t=tasks.find(x=>x.id===id); setDragId(null); if(t&&t.status===status) return; setTasks(p=>p.map(x=>x.id===id?{...x,status}:x)); await sb.from("dg_tasks").update({status}).eq("id",id); show("Moved to "+STATUS[status].label); if(t) notifyN8N("task.status_changed",{...t,status}); };
  const syncZoho=async(task)=>{
    show("Syncing to Zoho…");
    try{
      const {data,error}=await sb.functions.invoke("zoho-sync",{body:{task,assigneeName:memberOf(task.to)?.name}});
      if(error||!data?.ok){ show(data?.error?("Zoho: "+data.error.slice(0,60)):"Zoho sync failed — check function secrets"); return; }
      if(data.zoho_id){ await sb.from("dg_tasks").update({zoho_id:data.zoho_id}).eq("id",task.id); loadTasks(); }
      show("Synced to Zoho CRM"); setModal(m=>m?.editing?{editing:{...m.editing,zoho_id:data.zoho_id}}:m);
    }catch(e){ show("Zoho sync error"); }
  };
  const onDragStart=(e,id)=>{setDragId(id);e.dataTransfer.effectAllowed="move";};
  const switchUser=()=>{ try{localStorage.removeItem("dg_me");}catch(e){} setMe(null); setView("dashboard"); };

  const filtered=useMemo(()=>{
    let r=tasks;
    if(quick==="overdue") r=r.filter(isOverdue);
    else if(quick==="today") r=r.filter(isDueToday);
    else if(quick==="hot") r=r.filter(t=>(t.priority==="urgent"||t.priority==="high")&&t.status!=="done");
    else if(quick==="mine") r=r.filter(t=>t.to===meId);
    if(query){ const s=query.toLowerCase(); r=r.filter(t=>t.title.toLowerCase().includes(s)||(memberOf(t.to)?.name||"").toLowerCase().includes(s)||(t.dept||"").toLowerCase().includes(s)||STATUS[t.status].label.toLowerCase().includes(s)||PRIORITY[t.priority].label.toLowerCase().includes(s)); }
    if(filterTo!=="all") r=r.filter(t=>t.to===filterTo);
    if(filterStatus!=="all") r=r.filter(t=>t.status===filterStatus);
    if(filterPrio!=="all") r=r.filter(t=>t.priority===filterPrio);
    return r;
  },[tasks,query,quick,filterTo,filterStatus,filterPrio,memberOf,meId]);

  const M=useMemo(()=>{
    const mine=tasks.filter(t=>t.to===meId||t.by===meId);
    const active=mine.filter(t=>t.status!=="done"), overdue=mine.filter(isOverdue), dueToday=mine.filter(isDueToday), done=mine.filter(t=>t.status==="done");
    const rate=mine.length?Math.round(done.length/mine.length*100):0;
    const byStatus=STATUS_ORDER.map(s=>({key:s,value:mine.filter(t=>t.status===s).length,color:STATUS[s].color}));
    const load=members.map(m=>({m,active:mine.filter(t=>t.to===m.id&&t.status!=="done").length,overdue:mine.filter(t=>t.to===m.id&&isOverdue(t)).length})).filter(x=>x.active>0).sort((a,b)=>b.active-a.active);
    const maxLoad=Math.max(1,...load.map(x=>x.active));
    const upcoming=[...active].sort((a,b)=>(a.due||"").localeCompare(b.due||"")).slice(0,5);
    return {mine,active,overdue,dueToday,done,rate,byStatus,load,maxLoad,upcoming};
  },[tasks,members,meId]);

  if(loading) return <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",color:C.faint}}><IcLoad size={26} className="dg-spin"/></div>;
  if(!me || !members.some(m=>m.id===me)) return <NameGate members={members} onPick={(id)=>{ try{localStorage.setItem("dg_me",id);}catch(e){} setMe(id); }}/>;

  const meName=(memberOf(meId)?.name||"there").replace(/\s*\(You\)/,"").split(" ")[0];
  const meCanViewAll = !!memberOf(meId)?.can_view_all;
  const hour=new Date().getHours(); const greet=hour<12?"Good morning":hour<17?"Good afternoon":"Good evening";
  const NAV=[["dashboard","Dashboard",<IcGrid size={17}/>],["board","Board",<IcCols size={17}/>],["list","List",<IcList size={17}/>],["team","Team",<IcUsers size={17}/>]];
  const chips=[["overdue","Overdue",M.overdue.length],["today","Due today",M.dueToday.length],["hot","Urgent & high",M.mine.filter(t=>(t.priority==="urgent"||t.priority==="high")&&t.status!=="done").length],["mine","Assigned to me",M.mine.filter(t=>t.to===meId).length]];

  return (
    <div style={{minHeight:"100vh"}}>
      <header style={{position:"sticky",top:0,zIndex:40,background:"rgba(251,252,249,0.82)",backdropFilter:"blur(14px)",borderBottom:`1px solid ${C.line}`}}>
        <div style={{maxWidth:1180,margin:"0 auto",padding:"13px 22px",display:"flex",alignItems:"center",justifyContent:"space-between",gap:12}}>
          <div style={{display:"flex",alignItems:"center",gap:11}}>
            <div style={{position:"relative",width:38,height:38,borderRadius:12,background:`linear-gradient(180deg,#5b8a3f,${C.greenDark})`,display:"flex",alignItems:"center",justifyContent:"center",boxShadow:"0 6px 14px -6px rgba(58,99,37,0.6)"}}><IcClip size={20} style={{color:"#fff"}}/><IcSpark size={12} style={{color:C.gold,position:"absolute",top:-3,right:-3}}/></div>
            <span style={{fontSize:19,fontWeight:700,letterSpacing:-0.3}}>Delegate</span>
          </div>
          <nav style={{display:"flex",gap:3,background:"rgba(255,255,255,0.6)",padding:4,borderRadius:14,border:`1px solid ${C.line}`}}>
            {NAV.map(([k,l,ic])=><button key={k} onClick={()=>setView(k)} style={{display:"inline-flex",alignItems:"center",gap:7,padding:"8px 14px",borderRadius:10,border:"none",cursor:"pointer",background:view===k?"#fff":"transparent",color:view===k?C.green:C.sub,fontSize:13.5,fontWeight:600,boxShadow:view===k?"0 2px 8px -4px rgba(0,0,0,0.12)":"none",fontFamily:"inherit"}}>{ic}<span className="dg-navlabel">{l}</span></button>)}
          </nav>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <button onClick={()=>setModal({})} style={{display:"inline-flex",alignItems:"center",gap:7,padding:"10px 17px",borderRadius:12,border:"none",cursor:"pointer",background:`linear-gradient(180deg,#5b8a3f,${C.greenDark})`,color:"#fff",fontSize:14,fontWeight:700,boxShadow:"0 8px 18px -8px rgba(58,99,37,0.6)",fontFamily:"inherit"}}><IcPlus size={17}/><span className="dg-navlabel">Assign task</span></button>
            <button onClick={switchUser} title="Switch user" style={{...btnIcon,width:38,height:38,border:`1px solid ${C.line}`,background:"#fff"}}><IcOut size={17}/></button>
          </div>
        </div>
      </header>

      <main style={{maxWidth:1180,margin:"0 auto",padding:"24px 22px 64px"}}>
        {view==="dashboard"&&<div style={{display:"flex",flexDirection:"column",gap:20}}>
          <div><div style={{fontSize:25,fontWeight:700,letterSpacing:-0.5}}>{greet}, {meName} 👋</div><div style={{fontSize:14.5,color:C.sub,marginTop:2}}>Here's where your tasks stand today — assigned to you and delegated by you.</div></div>
          <div>
            <div style={{position:"relative",background:"#fff",borderRadius:16,border:`1px solid ${C.line}`,boxShadow:C.shadow,display:"flex",alignItems:"center",padding:"5px 16px"}}>
              <IcSearch size={18} style={{color:C.faint}}/><input value={query} onChange={e=>{setQuery(e.target.value);setQuick(null);}} onKeyDown={e=>{if(e.key==="Enter"&&query){setView("list");}}} placeholder="Search whatever you want…" style={{flex:1,border:"none",outline:"none",fontSize:15,padding:"11px 12px",color:C.ink,background:"transparent",fontFamily:"inherit"}}/>
              {query&&<button onClick={()=>setQuery("")} style={btnIcon}><IcX size={16}/></button>}
            </div>
            <div style={{display:"flex",gap:8,marginTop:11,flexWrap:"wrap"}}>{chips.map(([k,l,n])=><button key={k} onClick={()=>{const nv=quick===k?null:k;setQuick(nv);if(nv)setView("list");}} style={{display:"inline-flex",alignItems:"center",gap:6,padding:"6px 13px",borderRadius:20,cursor:"pointer",border:`1px solid ${quick===k?C.green:C.greenLine}`,background:quick===k?C.greenSoft:"rgba(255,255,255,0.6)",color:C.green,fontSize:12.5,fontWeight:600,fontFamily:"inherit"}}><IcSpark size={12} style={{color:C.gold}}/>{l}<span style={{color:C.faint,fontWeight:700}}>{n}</span></button>)}</div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit, minmax(190px, 1fr))",gap:14}}>
            <Kpi ic={<IcTrend size={17}/>} label="Active tasks" value={M.active.length} acc={{bg:C.greenSoft,color:C.green}}/>
            <Kpi ic={<IcAlert size={17}/>} label="Overdue" value={M.overdue.length} acc={{bg:"#fdecea",color:"#d8463c"}} sub={M.overdue.length?"needs attention":""}/>
            <Kpi ic={<IcClock size={17}/>} label="Due today" value={M.dueToday.length} acc={{bg:C.goldSoft,color:C.gold}}/>
            <Kpi ic={<IcCirc size={17}/>} label="Completion" value={M.rate+"%"} acc={{bg:"#eaf2fb",color:"#3f7fc0"}}/>
          </div>
          <div className="dg-dashgrid" style={{display:"grid",gridTemplateColumns:"1.6fr 1fr",gap:16}}>
            <div style={card}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}><span style={{fontSize:15.5,fontWeight:700}}>Workload by delegatee</span><span style={{fontSize:12,color:C.faint}}>active tasks</span></div>
              <div style={{marginTop:14,display:"flex",flexDirection:"column",gap:14}}>
                {M.load.length===0&&<div style={{color:C.faint,fontSize:13,padding:"10px 0"}}>No active tasks yet. Assign one to see workload here.</div>}
                {M.load.map(({m,active,overdue})=><div key={m.id} style={{display:"flex",alignItems:"center",gap:12}}><Avatar m={m} size={34}/><div style={{flex:1,minWidth:0}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:5}}><span style={{fontSize:13.5,fontWeight:600}}>{m.name.replace(/\s*\(You\)/,"")} <span style={{color:C.faint,fontWeight:500,fontSize:12}}>· {m.role}</span></span><span style={{fontSize:12.5,fontWeight:600,color:C.sub}}>{active} active{overdue>0&&<span style={{color:"#d8463c"}}> · {overdue} overdue</span>}</span></div>
                  <div style={{height:8,borderRadius:8,background:"#eef1ec",overflow:"hidden"}}><div style={{height:"100%",width:(active/M.maxLoad*100)+"%",borderRadius:8,background:overdue>0?"linear-gradient(90deg,#e8893b,#d8463c)":`linear-gradient(90deg,#6fa84e,${C.green})`,transition:"width .5s ease"}}/></div>
                </div></div>)}
              </div>
            </div>
            <div style={card}>
              <span style={{fontSize:15.5,fontWeight:700}}>Status mix</span>
              <div style={{display:"flex",alignItems:"center",gap:16,marginTop:12}}>
                <div style={{position:"relative"}}><Donut segments={M.byStatus}/><div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}><span style={{fontSize:26,fontWeight:700,lineHeight:1}}>{M.mine.length}</span><span style={{fontSize:11,color:C.faint,fontWeight:600}}>tasks</span></div></div>
                <div style={{display:"flex",flexDirection:"column",gap:9}}>{M.byStatus.map(s=><div key={s.key} style={{display:"flex",alignItems:"center",gap:8}}><span style={{width:10,height:10,borderRadius:10,background:s.color}}/><span style={{fontSize:12.5,color:C.sub,fontWeight:500}}>{STATUS[s.key].label}</span><span style={{fontSize:12.5,fontWeight:700}}>{s.value}</span></div>)}</div>
              </div>
            </div>
          </div>
          <div style={card}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}><span style={{fontSize:15.5,fontWeight:700}}>Upcoming deadlines</span><button onClick={()=>setView("list")} style={{display:"inline-flex",alignItems:"center",gap:3,fontSize:13,fontWeight:600,color:C.green,background:"none",border:"none",cursor:"pointer",fontFamily:"inherit"}}>View all <IcRight size={14}/></button></div>
            {M.upcoming.length===0&&<div style={{color:C.faint,fontSize:13,padding:"6px 0"}}>Nothing scheduled. Assign a task to get started.</div>}
            {M.upcoming.map((t,i)=><div key={t.id} onClick={()=>setModal({editing:t})} style={{display:"flex",alignItems:"center",gap:12,padding:"11px 4px",borderTop:i?`1px solid ${C.line}`:"none",cursor:"pointer"}}><Avatar m={memberOf(t.to)} size={30}/><span style={{flex:1,fontSize:14,fontWeight:600,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{t.title}</span><Pill cfg={PRIORITY[t.priority]}/><span style={{fontSize:12.5,fontWeight:600,color:isOverdue(t)?"#d8463c":C.sub,minWidth:90,textAlign:"right"}}>{fmtDate(t.due)} · {fmtTime(t.time)}</span></div>)}
          </div>
        </div>}

        {view==="board"&&<div style={{display:"flex",flexDirection:"column",gap:16}}>
          <Toolbar members={members} query={query} setQuery={setQuery} filterTo={filterTo} setFilterTo={setFilterTo} filterStatus={null} setFilterStatus={setFilterStatus} filterPrio={filterPrio} setFilterPrio={setFilterPrio} count={filtered.length} hideStatus/>
          <div style={{display:"flex",gap:13,overflowX:"auto",paddingBottom:6}}>{STATUS_ORDER.map(s=><Column key={s} status={s} tasks={filtered.filter(t=>t.status===s)} memberOf={memberOf} onOpen={t=>setModal({editing:t})} onDrop={moveTask} onDragStart={onDragStart} dragId={dragId} onAdd={st=>setModal({status:st})}/>)}</div>
        </div>}

        {view==="list"&&<div style={{display:"flex",flexDirection:"column",gap:16}}>
          <Toolbar members={members} query={query} setQuery={setQuery} filterTo={filterTo} setFilterTo={setFilterTo} filterStatus={filterStatus} setFilterStatus={setFilterStatus} filterPrio={filterPrio} setFilterPrio={setFilterPrio} count={filtered.length}/>
          {quick&&<div style={{marginTop:-6}}><span style={{display:"inline-flex",alignItems:"center",gap:6,fontSize:12.5,color:C.green,fontWeight:600}}><IcSpark size={13} style={{color:C.gold}}/>Quick filter active <button onClick={()=>setQuick(null)} style={{color:C.green,background:"none",border:"none",cursor:"pointer",fontWeight:700,fontFamily:"inherit"}}>clear</button></span></div>}
          <div style={{background:"#fff",borderRadius:18,border:`1px solid ${C.line}`,boxShadow:C.shadow,overflow:"hidden"}}>
            <div className="dg-listhead" style={{display:"grid",gridTemplateColumns:"1fr 150px 110px 100px 120px",gap:12,padding:"12px 18px",fontSize:11.5,fontWeight:700,color:C.faint,textTransform:"uppercase",letterSpacing:0.4,borderBottom:`1px solid ${C.line}`}}><span>Task</span><span>Delegatee</span><span>Priority</span><span>Status</span><span style={{textAlign:"right"}}>Due</span></div>
            {filtered.length===0&&<div style={{padding:"40px 20px",textAlign:"center",color:C.faint,fontSize:14}}>No tasks match. Clear the filters, or assign a new task.</div>}
            {filtered.map((t,i)=><div key={t.id} onClick={()=>setModal({editing:t})} className="dg-row" style={{display:"grid",gridTemplateColumns:"1fr 150px 110px 100px 120px",gap:12,alignItems:"center",padding:"13px 18px",cursor:"pointer",borderTop:i?`1px solid ${C.line}`:"none",borderLeft:isOverdue(t)?"3px solid #d8463c":"3px solid transparent"}}>
              <div style={{minWidth:0}}><div style={{fontSize:14,fontWeight:600,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{t.title}</div><div style={{fontSize:11,color:C.faint,fontFamily:"ui-monospace,monospace",marginTop:2}}>{t.code} · {t.dept}{t.zoho_id?" · Zoho ✓":""}</div></div>
              <div style={{display:"flex",alignItems:"center",gap:8,minWidth:0}}><Avatar m={memberOf(t.to)} size={26}/><span style={{fontSize:13,color:C.sub,fontWeight:500,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{memberOf(t.to)?memberOf(t.to).name.replace(/\s*\(You\)/,""):"Unassigned"}</span></div>
              <div><Pill cfg={PRIORITY[t.priority]}/></div><div><Pill cfg={STATUS[t.status]}/></div>
              <div style={{textAlign:"right",fontSize:12.5,fontWeight:600,color:isOverdue(t)?"#d8463c":C.sub}}>{fmtDate(t.due)}</div>
            </div>)}
          </div>
        </div>}

        {view==="team"&&<div style={{display:"flex",flexDirection:"column",gap:16}}>
          <div><div style={{fontSize:22,fontWeight:700,letterSpacing:-0.4}}>Team</div><div style={{fontSize:14,color:C.sub,marginTop:2}}>Who's carrying what. Click a card to see their tasks.</div></div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill, minmax(250px, 1fr))",gap:14}}>
            {members.map(m=>{const mine=tasks.filter(t=>t.to===m.id);const active=mine.filter(t=>t.status!=="done").length;const overdue=mine.filter(isOverdue).length;const done=mine.filter(t=>t.status==="done").length;
              return <div key={m.id} onClick={()=>{setFilterTo(m.id);setQuick(null);setQuery("");setView("list");}} className="dg-membercard" style={{...card,cursor:"pointer",transition:"transform .16s ease, box-shadow .16s ease"}}>
                <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:14}}><Avatar m={m} size={44}/><div style={{minWidth:0}}><div style={{fontSize:15,fontWeight:700}}>{m.name}</div><div style={{fontSize:12.5,color:C.sub}}>{m.role} · {m.dept}</div></div></div>
                <div style={{display:"flex",gap:8}}><Stat label="Active" value={active} color={C.green}/><Stat label="Overdue" value={overdue} color={overdue?"#d8463c":C.faint}/><Stat label="Done" value={done} color={C.sub}/></div>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginTop:14,fontSize:13,fontWeight:600,color:C.green}}>View tasks <IcRight size={15}/></div>
              </div>;})}
          </div>
        </div>}
      </main>

      <AssignModal open={!!modal} editing={modal&&modal.editing} presetStatus={modal&&modal.status} members={members} me={meId} isAdmin={!!memberOf(meId)?.is_admin} onClose={()=>setModal(null)} onSave={saveTask} onDelete={delTask} onSync={syncZoho}/>
      {toast&&<div className="dg-toast" style={{position:"fixed",bottom:24,left:"50%",transform:"translateX(-50%)",zIndex:80,display:"flex",alignItems:"center",gap:9,padding:"12px 18px",borderRadius:13,background:"#1f2a22",color:"#fff",fontSize:14,fontWeight:600,boxShadow:"0 14px 34px -10px rgba(0,0,0,0.4)"}}><div style={{width:20,height:20,borderRadius:20,background:C.green,display:"flex",alignItems:"center",justifyContent:"center"}}><IcCheck size={13}/></div>{toast.m}</div>}
    </div>
  );
}
const card={background:"#fff",borderRadius:20,padding:"18px 20px",border:`1px solid ${C.line}`,boxShadow:C.shadow};
function Kpi({ic,label,value,acc,sub}){return <div style={{background:"#fff",borderRadius:18,padding:"16px 18px",border:`1px solid ${C.line}`,boxShadow:C.shadow}}><div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}><div style={{width:30,height:30,borderRadius:9,background:acc.bg,color:acc.color,display:"flex",alignItems:"center",justifyContent:"center"}}>{ic}</div><span style={{fontSize:12.5,fontWeight:600,color:C.sub}}>{label}</span></div><div style={{display:"flex",alignItems:"baseline",gap:7}}><span style={{fontSize:30,fontWeight:700,letterSpacing:-0.5}}>{value}</span>{sub&&<span style={{fontSize:12,fontWeight:600,color:acc.color}}>{sub}</span>}</div></div>;}
function Stat({label,value,color}){return <div style={{flex:1,background:"#f7f9f5",borderRadius:12,padding:"9px 10px",textAlign:"center"}}><div style={{fontSize:20,fontWeight:700,color}}>{value}</div><div style={{fontSize:11,fontWeight:600,color:C.faint}}>{label}</div></div>;}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
